<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    /* Premium wellness palette */
    --ink: #0E1814;
    --ink-soft: rgba(14, 24, 20, 0.72);
    --ink-faded: rgba(14, 24, 20, 0.5);
    --cream: #F6F1E8;
    --cream-deep: #EDE5D4;
    --paper: #FBF8F1;
    --forest: #1F4D2C;
    --forest-deep: #0F2A18;
    --forest-soft: #2C6B3F;
    --coral: #E8543B;
    --coral-soft: #F2A491;
    --gold: #C99848;
    --line: rgba(14, 24, 20, 0.10);
    --line-strong: rgba(14, 24, 20, 0.18);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; height: auto; }
  a { color: inherit; }

  /* === Layout === */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .narrow { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  section { padding: 120px 0; position: relative; }
  section.compact { padding: 80px 0; }
  @media (max-width: 768px) {
    section { padding: 80px 0; }
  }

  /* === Typography === */
  h1, h2, h3, h4 {
    font-family: 'Instrument Sans', sans-serif;
    margin: 0 0 20px;
    color: var(--ink);
    text-wrap: balance;
    letter-spacing: -0.02em;
  }
  h1 { font-size: clamp(40px, 6vw, 84px); line-height: 1.02; font-weight: 600; letter-spacing: -0.035em; }
  h2 { font-size: clamp(32px, 4vw, 56px); line-height: 1.06; font-weight: 600; letter-spacing: -0.025em; }
  h3 { font-size: clamp(20px, 1.8vw, 26px); line-height: 1.2; font-weight: 600; }
  h4 { font-size: 18px; line-height: 1.3; font-weight: 600; }
  .display {
    font-family: 'Instrument Serif', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    color: var(--forest);
  }
  p { margin: 0 0 16px; color: var(--ink-soft); text-wrap: pretty; }
  .lead { font-size: clamp(18px, 1.5vw, 22px); line-height: 1.5; color: var(--ink-soft); text-wrap: balance; }
  .micro { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faded); font-weight: 500; }

  /* === Buttons === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--forest);
    color: #fff !important;
    text-decoration: none;
    font-weight: 600;
    font-family: 'Instrument Sans', sans-serif;
    padding: 18px 36px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 16px;
    box-shadow: 0 4px 16px -6px rgba(31,77,44,0.5);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: ""; position: absolute; inset: 0;
    background: var(--forest-soft);
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn:hover::before { transform: scaleX(1); }
  .btn span { position: relative; z-index: 1; display: inline-flex; gap: 10px; align-items: center; }
  .btn.lg { padding: 22px 44px; font-size: 17px; }
  .btn.coral { background: var(--coral); box-shadow: 0 4px 16px -6px rgba(232,84,59,0.5); }
  .btn.coral::before { background: #d44425; }
  .btn.ghost { background: transparent; color: var(--ink) !important; border: 1.5px solid var(--line-strong); box-shadow: none; }
  .btn.ghost::before { background: var(--ink); }
  .btn.ghost:hover { color: #fff !important; }

  /* === Sticky top bar (countdown + CTA) === */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink);
    color: #fff;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .topbar-left { display: flex; align-items: center; gap: 18px; font-size: 14px; flex-wrap: wrap; }
  .topbar-left strong { color: var(--coral-soft); font-weight: 600; }
  .topbar-cta { font-size: 13px; padding: 9px 18px; background: #fff; color: var(--ink) !important; border-radius: 999px; text-decoration: none; font-weight: 600; transition: all .2s; }
  .topbar-cta:hover { background: var(--coral); color: #fff !important; }
  .countdown { display: inline-flex; gap: 6px; font-variant-numeric: tabular-nums; font-weight: 600; }
  .countdown b { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; min-width: 30px; text-align: center; }

  /* === Hero === */
  .hero {
    padding: 80px 0 100px;
    background:
      radial-gradient(1200px 600px at 50% -100px, rgba(31,77,44,0.06), transparent 60%),
      var(--paper);
    position: relative;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 64px;
    align-items: center;
  }
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    background: rgba(31,77,44,0.08);
    border: 1px solid rgba(31,77,44,0.18);
    border-radius: 999px;
    font-size: 13px;
    color: var(--forest);
    font-weight: 600;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }
  .hero-eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--forest); position: relative; }
  .hero-eyebrow .dot::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    background: var(--forest); opacity: 0.3;
    animation: ping 2s infinite ease-out;
  }
  @keyframes ping {
    0% { transform: scale(0.8); opacity: 0.4; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .hero h1 .accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--forest); }
  .hero h1 .strike { position: relative; display: inline-block; }
  .hero h1 .strike::after {
    content: ""; position: absolute;
    left: -4px; right: -4px; top: 52%;
    height: 4px;
    background: var(--coral);
    transform: rotate(-3deg);
  }

  .hero-sub { font-size: 19px; line-height: 1.55; margin: 0 0 32px; max-width: 540px; }

  .hero-cta-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 36px; }
  .hero-meta-row { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; padding-top: 32px; border-top: 1px solid var(--line); }
  .hero-meta-row .item { display: flex; gap: 12px; align-items: center; }
  .hero-meta-row .item .num { font-family: 'Instrument Serif', serif; font-size: 32px; line-height: 1; color: var(--forest); }
  .hero-meta-row .item .lbl { font-size: 13px; color: var(--ink-soft); max-width: 120px; }

  /* Hero visual */
  .hero-visual {
    position: relative;
    aspect-ratio: 4 / 5;
    border-radius: 200px 12px 200px 12px;
    overflow: hidden;
    background: var(--cream-deep);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  @media (max-width: 900px) {
    .hero-visual { aspect-ratio: 16/10; border-radius: 60px 8px 60px 8px; }
  }
  .hero-visual::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(31,77,44,0.05), transparent 60%),
      radial-gradient(circle at 70% 70%, rgba(232,84,59,0.04), transparent 60%);
  }
  .play-btn {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform .3s ease;
    border: none;
    box-shadow: 0 12px 40px -8px rgba(14,24,20,0.25), 0 2px 8px rgba(14,24,20,0.08);
    position: relative;
    z-index: 2;
  }
  .play-btn::after {
    content: ""; position: absolute; inset: -10px;
    border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.5);
    animation: pulseRing 2s infinite ease-out;
  }
  @keyframes pulseRing {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .play-btn svg { color: var(--forest); margin-left: 4px; }
  .play-btn:hover { transform: scale(1.05); }

  .hero-badge {
    position: absolute; bottom: 24px; left: 24px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 18px;
    border-radius: 16px;
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
    box-shadow: 0 4px 16px -4px rgba(14,24,20,0.15);
    display: flex; align-items: center; gap: 8px;
  }
  .hero-badge .live { width: 8px; height: 8px; border-radius: 50%; background: var(--coral); position: relative; }
  .hero-badge .live::after { content: ""; position: absolute; inset: -3px; border-radius: 50%; background: var(--coral); opacity: 0.4; animation: ping 1.6s infinite; }

  /* === Trust strip === */
  .trust-strip {
    background: var(--cream);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 40px 0;
  }
  .trust-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    text-align: center;
  }
  @media (max-width: 720px) { .trust-grid { grid-template-columns: repeat(2, 1fr); gap: 28px; } }
  .trust-stat .num {
    font-family: 'Instrument Serif', serif;
    font-size: 48px;
    line-height: 1;
    color: var(--forest);
    font-style: italic;
  }
  .trust-stat .lbl {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  /* === Problem (PAS framework) === */
  .problem-section {
    background: var(--paper);
    text-align: center;
  }
  .problem-section h2 {
    max-width: 800px;
    margin: 0 auto 32px;
  }
  .problem-section .lead { max-width: 640px; margin: 0 auto 16px; }
  .problem-quotes {
    margin-top: 64px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
  }
  @media (max-width: 720px) { .problem-quotes { grid-template-columns: 1fr; } }
  .problem-quote {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 28px;
    text-align: left;
    transform: rotate(-1deg);
    transition: transform .3s ease;
  }
  .problem-quote:nth-child(2) { transform: rotate(0.5deg); }
  .problem-quote:nth-child(3) { transform: rotate(-0.5deg); }
  .problem-quote:hover { transform: rotate(0); }
  .problem-quote .label { font-size: 12px; color: var(--ink-faded); margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
  .problem-quote .text { font-family: 'Instrument Serif', serif; font-size: 19px; line-height: 1.4; color: var(--ink); font-style: italic; margin: 0; }

  /* === How it works (3 steps) === */
  .how-section { background: var(--cream); }
  .how-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 64px;
  }
  @media (max-width: 720px) { .how-grid { grid-template-columns: 1fr; } }
  .how-step {
    background: var(--paper);
    border-radius: 28px;
    padding: 36px 32px;
    border: 1px solid var(--line);
    position: relative;
  }
  .how-step .num {
    font-family: 'Instrument Serif', serif;
    font-size: 64px;
    line-height: 1;
    color: var(--forest);
    font-style: italic;
    position: absolute;
    top: 24px; right: 32px;
    opacity: 0.4;
  }
  .how-step .icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--forest);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .how-step .icon svg { width: 26px; height: 26px; }
  .how-step h3 { margin-bottom: 12px; }
  .how-step p { font-size: 15px; line-height: 1.5; }

  /* === Day-by-day timeline === */
  .timeline-section { background: var(--paper); }
  .timeline {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 720px) { .timeline { grid-template-columns: 1fr 1fr; } }
  .week {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 22px;
    position: relative;
  }
  .week::before {
    content: "";
    position: absolute;
    top: 28px; right: 22px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--coral);
  }
  .week .label { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faded); margin-bottom: 8px; }
  .week .num { font-family: 'Instrument Serif', serif; font-size: 36px; font-style: italic; line-height: 1; color: var(--forest); margin-bottom: 14px; }
  .week h4 { font-size: 16px; margin-bottom: 8px; }
  .week p { font-size: 14px; margin: 0; }

  /* === Comparison table === */
  .compare-section { background: var(--ink); color: #fff; }
  .compare-section h2 { color: #fff; }
  .compare-section .lead { color: rgba(255,255,255,0.7); }
  .compare-table {
    margin-top: 56px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    overflow: hidden;
  }
  .compare-row {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .compare-row:last-child { border-bottom: 0; }
  .compare-cell {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
  }
  .compare-cell.head {
    background: rgba(255,255,255,0.05);
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.7);
  }
  .compare-cell.us { background: rgba(31,77,44,0.25); color: #fff; }
  .compare-cell .check { width: 22px; height: 22px; border-radius: 50%; background: var(--forest-soft); color: #fff; display: flex; align-items: center; justify-content: center; flex: 0 0 22px; }
  .compare-cell .x { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; flex: 0 0 22px; }
  @media (max-width: 720px) {
    .compare-row { grid-template-columns: 1fr 1fr; }
    .compare-row > .compare-cell:first-child { grid-column: 1/-1; padding-bottom: 6px; }
  }

  /* === Benefits (icon cards) === */
  .benefits-section { background: var(--paper); }
  .benefits-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 720px) { .benefits-grid { grid-template-columns: 1fr; } }
  .benefit-tile {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 32px 28px;
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .benefit-tile:hover { transform: translateY(-4px); box-shadow: 0 24px 48px -28px rgba(14,24,20,0.18); border-color: rgba(31,77,44,0.3); }
  .benefit-tile .icon-wrap {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: rgba(31,77,44,0.08);
    color: var(--forest);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .benefit-tile h4 { font-size: 18px; margin-bottom: 8px; }
  .benefit-tile p { font-size: 15px; margin: 0; line-height: 1.5; }
  .benefit-tile.feature {
    background: linear-gradient(160deg, var(--forest), var(--forest-deep));
    color: #fff;
    border: none;
  }
  .benefit-tile.feature h4, .benefit-tile.feature p { color: #fff; }
  .benefit-tile.feature p { color: rgba(255,255,255,0.8); }
  .benefit-tile.feature .icon-wrap { background: rgba(255,255,255,0.12); color: #fff; }
  .benefit-tile.feature .stat {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    font-style: italic;
    line-height: 1;
    margin-bottom: 14px;
  }

  /* === Meals === */
  .meals-section { background: var(--cream); }
  .meals-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 720px) { .meals-grid { grid-template-columns: 1fr 1fr; } }
  .meal-tile {
    aspect-ratio: 4/5;
    border-radius: 24px;
    background: var(--cream-deep);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .meal-tile::before {
    content: "";
    width: 56px; height: 56px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231F4D2C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>");
    background-position: center; background-repeat: no-repeat; background-size: contain;
    opacity: 0.35;
  }
  .meal-tile .label {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(255,255,255,0.92);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .meal-tile .tag {
    position: absolute; top: 16px; right: 16px;
    background: var(--forest);
    color: #fff;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* === Transformations === */
  .transformations-section { background: var(--paper); }
  .transform-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 720px) { .transform-grid { grid-template-columns: 1fr 1fr; } }
  .transform-card {
    border-radius: 20px;
    overflow: hidden;
    background: #fff;
    border: 1px solid var(--line);
    transition: all .3s ease;
  }
  .transform-card:hover { transform: translateY(-4px); box-shadow: 0 24px 48px -28px rgba(14,24,20,0.2); }
  .transform-card .photo {
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
  }
  .transform-card .photo img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
  .transform-card:hover .photo img { transform: scale(1.06); }
  .transform-card .badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--coral);
    color: #fff;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 12px -4px rgba(232,84,59,0.5);
  }
  .transform-card .info { padding: 14px 16px; text-align: center; }
  .transform-card .name { font-weight: 600; font-size: 14px; }
  .transform-card .meta { font-size: 12px; color: var(--ink-faded); margin-top: 2px; }

  /* === Testimonials === */
  .testimonials-section { background: var(--cream); }
  .testimonials-masonry {
    margin-top: 56px;
    columns: 2;
    column-gap: 24px;
    max-width: 880px;
    margin-left: auto;
    margin-right: auto;
  }
  .testimonials-masonry img {
    width: 100%; border-radius: 16px; margin-bottom: 24px;
    break-inside: avoid; -webkit-column-break-inside: avoid;
    box-shadow: 0 8px 24px -16px rgba(14,24,20,0.15);
  }
  @media (max-width: 720px) { .testimonials-masonry { columns: 1; } }

  /* === Offer === */
  .offer-section {
    background: linear-gradient(180deg, var(--paper) 0%, var(--cream) 100%);
  }
  .offer-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 40px;
    align-items: stretch;
    max-width: 1080px;
    margin-left: auto; margin-right: auto;
  }
  @media (max-width: 820px) {
    .offer-grid { grid-template-columns: 1fr; }
  }
  .offer-features {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 36px;
  }
  .offer-features h3 { font-size: 22px; margin-bottom: 24px; }
  .offer-features ul { list-style: none; padding: 0; margin: 0; }
  .offer-features li { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); font-size: 16px; color: var(--ink); }
  .offer-features li:last-child { border-bottom: 0; }
