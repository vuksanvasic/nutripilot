<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #317039;
    --primary-hover: #388041;
    --primary-soft: #e8f1e9;
    --dark: #101a24;
    --text: #101a24cc;
    --text-soft: #101a2499;
    --background: #ffffff;
    --secondary: #f8f8f8;
    --line: #ececec;
    --accent: #f23849;
    --accent-deep: #b80003;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--background);
    color: var(--dark);
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 24px;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; max-width: 100%; height: auto; }
  a { color: inherit; }

  /* === Layout — match Nutribox: 1288px container, 100px section padding === */
  .container { max-width: 1288px; margin: 0 auto; padding: 0 24px; }
  .container-sm { max-width: 880px; margin: 0 auto; padding: 0 24px; }
  section { padding: 100px 0; }
  section.tinted { background: var(--secondary); }
  section.dark { background: var(--dark); color: #fff; }
  section.danger { background: linear-gradient(180deg, #2a0a0a 0%, #1c0606 100%); color: #f5e6e6; }
  @media (max-width: 768px) {
    section { padding: 60px 0; }
  }

  /* === Typography — match Nutribox: H1 40/56 weight 600, H2 44/56 weight 500 === */
  h1, h2, h3, h4 {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    margin: 0 0 16px;
    color: var(--dark);
    text-wrap: balance;
  }
  h1 { font-size: 48px; line-height: 60px; font-weight: 600; }
  h2 { font-size: 44px; line-height: 56px; font-weight: 500; }
  h3 { font-size: 24px; line-height: 30px; font-weight: 600; }
  h4 { font-size: 18px; line-height: 27px; font-weight: 600; }
  @media (max-width: 768px) {
    h1 { font-size: 36px; line-height: 44px; }
    h2 { font-size: 32px; line-height: 40px; }
    h3 { font-size: 20px; line-height: 28px; }
  }
  p { margin: 0 0 12px; color: var(--text); text-wrap: pretty; }
  .lead { font-size: 18px; line-height: 27px; font-weight: 300; color: var(--text); text-wrap: balance; }
  .lead.shorter { max-width: 620px; }
  strong { color: var(--dark); font-weight: 600; }

  /* === U centriranim sekcijama: constraint na čitku širinu (~60-65 chars) === */
  .center h2 { max-width: 800px; margin-left: auto; margin-right: auto; }
  .center .lead, .center p { max-width: 60ch; margin-left: auto; margin-right: auto; }
  section.dark h1, section.dark h2, section.dark h3,
  section.danger h1, section.danger h2, section.danger h3 { color: #fff; }
  section.dark p, section.dark .lead { color: rgba(255,255,255,0.78); }
  section.dark strong { color: #fff; }
  section.danger p, section.danger .lead { color: rgba(245,230,230,0.85); }
  section.danger strong { color: #fff; }

  .eyebrow {
    color: var(--primary);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: inline-block;
  }
  .eyebrow.red { color: var(--accent); }
  section.dark .eyebrow { color: #9adb9f; }
  section.danger .eyebrow { color: #ff8e8e; }

  .center { text-align: center; }

  /* === Buttons — match Nutribox: 12px 60px padding, 1rem (16px) radius === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--primary);
    color: #fff !important;
    text-decoration: none;
    font-weight: 600;
    font-family: 'Instrument Sans', sans-serif;
    padding: 12px 60px;
    border-radius: 1rem;
    border: none;
    cursor: pointer;
    transition: all .18s ease;
    font-size: 16px;
    line-height: 24px;
    box-shadow: 0 8px 24px -10px rgba(49,112,57,0.45);
  }
  .btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 14px 32px -10px rgba(49,112,57,0.55); }
  .btn.lg { padding: 16px 60px; font-size: 17px; }
  .btn.full { width: 100%; }
  .btn.white { background: #fff; color: var(--dark) !important; box-shadow: 0 8px 24px -12px rgba(0,0,0,0.4); }
  .btn.white:hover { background: #f0f0f0; }
  .btn.dark { background: var(--dark); box-shadow: 0 8px 24px -10px rgba(16,26,36,0.5); }
  .btn .arrow { transition: transform .18s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* === Pills / Tags === */
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--primary-soft);
    color: var(--primary);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 24px;
    border: 1px solid rgba(49,112,57,0.18);
  }
  .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pulse 2s ease infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(49,112,57,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(49,112,57,0); }
  }

  /* === Logo bar === */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--dark);
    text-decoration: none;
  }
  .brand .x { color: var(--text-soft); font-weight: 400; }
  .nav .btn { padding: 12px 22px; font-size: 14px; box-shadow: none; }
  @media (max-width: 600px) {
    .nav .btn { padding: 10px 16px; font-size: 13px; }
    .brand { font-size: 14px; }
  }

  /* === HERO === */
  .hero { padding: 72px 0 80px; text-align: center; position: relative; overflow: hidden; }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(900px 400px at 50% -10%, rgba(49,112,57,0.10), transparent 70%),
      radial-gradient(600px 300px at 50% 100%, rgba(49,112,57,0.05), transparent 70%);
    pointer-events: none;
  }
  .hero-inner { position: relative; }
  .hero h1 { max-width: 920px; margin: 0 auto 22px; }
  .hero h1 .accent { color: var(--primary); font-style: italic; }
  .hero .lead { max-width: 720px; margin: 0 auto 32px; }
  .hero-cta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .hero-meta {
    display: flex; gap: 24px 36px; flex-wrap: wrap;
    justify-content: center;
    color: var(--text-soft);
    font-size: 14px;
    margin-bottom: 56px;
  }
  .hero-meta div { display: flex; align-items: center; gap: 8px; }

  .hero-visual {
    position: relative;
    border-radius: 40px 8px;
    overflow: hidden;
    aspect-ratio: 16 / 9;
    background: #e5e7e6;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .play-button {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s ease;
    border: none;
    box-shadow: 0 8px 24px -8px rgba(16,26,36,0.2);
  }
  .play-button:hover { transform: scale(1.06); }
  .play-button svg { color: var(--dark); margin-left: 4px; }

  /* === Trust bar === */
  .trust {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--secondary);
    padding: 28px 0;
  }
  .trust-inner {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    text-align: center;
  }
  .trust-item .num {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 32px; font-weight: 600; color: var(--dark);
    line-height: 1;
  }
  .trust-item .lbl { font-size: 13px; color: var(--text-soft); margin-top: 6px; }
  @media (max-width: 720px) {
    .trust-inner { grid-template-columns: repeat(2, 1fr); gap: 28px; }
  }

  /* === Generic 2/3-col layouts === */
  .row { display: grid; gap: 24px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  .row.three { grid-template-columns: repeat(3, 1fr); }
  .row.four { grid-template-columns: repeat(4, 1fr); }
  .row.split { grid-template-columns: 1.4fr 1fr; gap: 56px; align-items: center; }
  @media (max-width: 820px) {
    .row.two, .row.three, .row.four, .row.split { grid-template-columns: 1fr; gap: 20px; }
  }

  .heading-block { max-width: 720px; margin: 0 auto 56px; text-align: center; }
  .heading-block.left { margin-left: 0; text-align: left; }

  /* === Benefit cards (Nutribox benefit_card stil) === */
  .benefit-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 40px 8px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: all .18s ease;
  }
  .benefit-card:hover { transform: translateY(-3px); box-shadow: 0 24px 48px -28px rgba(16,26,36,0.18); border-color: rgba(49,112,57,0.3); }
  .benefit-icon {
    width: 60px; height: 60px;
    border-radius: 16px 4px;
    background: var(--primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 60px;
  }
  .benefit-icon svg { width: 28px; height: 28px; }
  .benefit-card .text { font-size: 16px; line-height: 24px; color: var(--dark); }
  .benefit-card .text strong { font-weight: 600; }

  /* === Steps — Nutribox signature: 40px 8px asymmetric card, 16px 4px icon === */
  .step {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 40px 8px;
    padding: 30px;
    transition: all .18s ease;
  }
  .step:hover { transform: translateY(-3px); box-shadow: 0 24px 48px -28px rgba(16,26,36,0.18); border-color: rgba(49,112,57,0.3); }
  section.tinted .step { background: #fff; }
  .step-num {
    width: 60px; height: 60px;
    border-radius: 16px 4px;
    background: var(--primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 600;
    font-size: 24px;
    margin-bottom: 22px;
  }

  /* === Checks list === */
  .checks { list-style: none; padding: 0; margin: 0; }
  .checks li {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    color: var(--dark);
    font-size: 16px;
    border-bottom: 1px solid var(--line);
  }
  .checks li:last-child { border-bottom: 0; }
  .checks li::before {
    content: "";
    flex: 0 0 26px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--primary);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
    background-size: 14px;
    background-position: center;
    background-repeat: no-repeat;
    margin-top: 1px;
  }
  .checks.simple li { border-bottom: 0; padding: 8px 0; }
  section.dark .checks li, section.danger .checks li { color: #fff; border-bottom-color: rgba(255,255,255,0.08); }

  /* === Transformations grid === */
  .transformation {
    border-radius: 40px 8px;
    overflow: hidden;
    background: #fff;
    border: 1px solid var(--line);
    transition: all .18s ease;
  }
  .transformation:hover { transform: translateY(-3px); box-shadow: 0 24px 48px -28px rgba(16,26,36,0.2); }
  .transformation .image {
    aspect-ratio: 4/5;
    position: relative;
    overflow: hidden;
    background: var(--secondary);
  }
  .transformation .image img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .4s ease;
  }
  .transformation:hover .image img { transform: scale(1.04); }
  .transformation .badge {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--primary);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    z-index: 2;
    box-shadow: 0 4px 12px -4px rgba(0,0,0,0.3);
  }
  .transformation .info {
    padding: 16px 20px;
    text-align: center;
  }
  .transformation .name { font-weight: 600; font-size: 15px; color: var(--dark); }
  .transformation .caption { font-size: 13px; color: var(--text-soft); margin-top: 2px; }

  /* === Meals grid — placeholder dok ne stignu zvanične slike === */
  .meal {
    border-radius: 40px 8px;
    overflow: hidden;
    aspect-ratio: 4/5;
    position: relative;
    background: #e5e7e6;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--line);
  }
  .meal::before {
    content: "";
    width: 64px; height: 64px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8b0ad' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    opacity: 0.6;
  }
  .meal .label {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(255,255,255,0.95);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
  }

  /* === Testimonials — masonry layout (2 kolone, kao na Mangrowe sajtu) === */
  .testimonials-masonry {
    columns: 2;
    column-gap: 32px;
    max-width: 880px;
    margin: 0 auto;
  }
  .testimonials-masonry .testimonial-image {
    width: 100%;
    height: auto;
    border-radius: 16px;
    display: block;
    margin-bottom: 32px;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    page-break-inside: avoid;
  }
  @media (max-width: 720px) {
    .testimonials-masonry { columns: 1; }
  }

  /* === Offer card === */
  .offer-card {
    background: linear-gradient(150deg, var(--dark) 0%, #1d2c3a 100%);
    color: #fff;
    border-radius: 40px 8px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px -28px rgba(16,26,36,0.4);
  }
  .offer-card::before {
    content: ""; position: absolute; top: -120px; right: -80px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(49,112,57,0.5), transparent 70%);
    pointer-events: none;
  }
  .offer-card .pill { background: rgba(49,112,57,0.25); color: #9adb9f; border-color: rgba(154,219,159,0.25); margin-bottom: 18px; }
  .offer-card .pill .dot { background: #9adb9f; }
  .offer-card .price-block { display: flex; align-items: baseline; gap: 14px; margin: 14px 0 4px; }
  .offer-card .price {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 64px;
    font-weight: 600;
    line-height: 1;
  }
  .offer-card .price-note { color: rgba(255,255,255,0.6); font-size: 14px; }
  .offer-card p { color: rgba(255,255,255,0.78); }
  .offer-card .checks li {
    color: rgba(255,255,255,0.95);
    border-bottom-color: rgba(255,255,255,0.08);
  }
  .offer-card .checks li::before {
    background: #fff;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23317039' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
  }
  .spots-bar {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px 18px;
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
  }
  .spots-bar strong { color: #fff; }

  /* === Countdown (scarcity) === */
  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 560px;
    margin: 40px auto 0;
  }
  .countdown-cell {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 22px 12px;
    text-align: center;
  }
  .countdown-cell .num {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 48px;
    font-weight: 600;
    line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .countdown-cell .lbl {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .countdown-label {
    margin-top: 28px;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  @media (max-width: 540px) {
    .countdown { grid-template-columns: repeat(2, 1fr); max-width: 320px; }
    .countdown-cell .num { font-size: 36px; }
  }

  /* === Guarantee section — balansirane proporcije === */
  .guarantee-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 40px;
    align-items: center;
    max-width: 1080px;
    margin: 0 auto;
  }
  @media (max-width: 820px) {
    .guarantee-grid { grid-template-columns: 1fr; gap: 32px; text-align: center; }
  }

  /* === Guarantee seal === */
  .seal-wrap { display: flex; justify-content: center; }
  .seal {
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--primary-hover), var(--primary));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Instrument Sans', sans-serif;
    text-align: center;
    padding: 24px;
    line-height: 1.15;
    font-weight: 600;
    box-shadow: 0 24px 60px -20px rgba(49,112,57,0.5);
    position: relative;
  }
  .seal::before {
    content: "";
    position: absolute; inset: 10px;
    border: 1.5px dashed rgba(255,255,255,0.4);
    border-radius: 50%;
  }
  .seal .big { display: block; font-size: 56px; line-height: 1; margin-bottom: 6px; letter-spacing: -0.02em; }
  .seal .sm { display: block; font-size: 14px; opacity: 0.95; }

  /* === Stats === */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 36px; }
  @media (max-width: 720px) { .stat-grid { grid-template-columns: 1fr; } }
  .stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 26px;
    text-align: center;
  }
  .stat .label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
  }
  .stat .value {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 38px;
    font-weight: 600;
    color: #fff;
  }

  /* === FAQ === */
  details {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 24px 4px;
    padding: 22px 26px;
    margin-bottom: 12px;
    transition: all .15s ease;
  }
  details[open] { border-color: rgba(49,112,57,0.3); box-shadow: 0 16px 40px -28px rgba(49,112,57,0.25); }
  summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    color: var(--dark);
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::after {
    content: "";
    flex: 0 0 28px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--primary-soft);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23317039' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='5' x2='12' y2='19'/><line x1='5' y1='12' x2='19' y2='12'/></svg>");
    background-size: 14px;
    background-position: center;
    background-repeat: no-repeat;
    transition: all .2s ease;
  }
  details[open] summary::after {
    background-color: var(--primary);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><line x1='5' y1='12' x2='19' y2='12'/></svg>");
    transform: rotate(180deg);
  }
