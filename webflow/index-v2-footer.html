<script>
  // Live countdown — counts down to May 23 2026 23:59
  (function() {
    const target = new Date('2026-05-23T23:59:00').getTime();
    const cells = document.querySelectorAll('#countdown .countdown-cell .num');
    if (!cells.length) return;
    function tick() {
      const now = Date.now();
      const diff = target - now;
      if (diff <= 0) return;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      cells[0].textContent = String(d).padStart(2, '0');
      cells[1].textContent = String(h).padStart(2, '0');
      cells[2].textContent = String(m).padStart(2, '0');
      cells[3].textContent = String(s).padStart(2, '0');
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
